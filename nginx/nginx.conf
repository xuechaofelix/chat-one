worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式配置
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # 优化传输
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        # 1. 核心：指定 Docker 内部 DNS，支持动态解析
        resolver 127.0.0.11 valid=30s;

        # 2. 代理所有流量（包括前端 UI、静态资源和后端 API）
        location / {
            # 将后端服务名放入变量中，防止 new-api 没启动时 Nginx 崩溃
            set $backend_url "http://new-api:3000";
            proxy_pass $backend_url; 
            
            # 传递标准的请求头，确保 new-api 能获取到真实的客户端 IP 和域名
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 针对大流量接口（如大模型流式传输、长文本返回）优化缓冲区
            proxy_buffer_size          128k;
            proxy_buffers              4 256k;
            proxy_busy_buffers_size    256k;

            # 支持 WebSocket（部分 AI 聊天界面可能需要）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}