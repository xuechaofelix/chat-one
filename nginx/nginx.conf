worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile        on;
    keepalive_timeout  65;

    # 1. 开启 Gzip 网页压缩（拯救几秒卡顿的核心）
    gzip on;
    gzip_min_length 1k;              # 小于 1kb 的文件不压缩
    gzip_buffers 4 16k;
    gzip_http_version 1.1;
    gzip_comp_level 6;               # 压缩级别1-9，6是速度和压缩率的黄金平衡点
    # 压缩哪些类型的文件（包含 JS、CSS、图片、SVG 等）
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png image/svg+xml;
    gzip_vary on;                    # 让前端缓存服务器也支持 Gzip 识别

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      keep-alive;
    }

    upstream new_api_backend {
        server new-api:3000;
        keepalive 32;
    }

    server {
        listen       80;
        server_name  chatone.site;

        # 📢 配置你刚刚申请成功的专属 SSL 证书路径
        ssl_certificate      /etc/letsencrypt/live/chatone.site/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/chatone.site/privkey.pem;

        # SSL 基础安全安全配置
        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        resolver 127.0.0.11 valid=30s;

        # Let's Encrypt 机器人临时验证路径
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 2. 静态资源强缓存配置（只针对 JS、CSS、图片等静态文件）
        # 浏览器第二次访问时会直接读取本地缓存，耗时直接变成 0 秒
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            proxy_pass http://new_api_backend; # 依然从后端获取文件
            
            # expires 30d;                      # 浏览器缓存 30 天
            add_header Cache-Control "no-cache, must-revalidate";
            # no-cache 的意思是：每次使用缓存前，必须先去服务器验证文件变了没

            access_log off;                   # 关闭静态资源的访问日志，减轻磁盘 I/O 压力
            
            # 保持必要的请求头
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. 动态接口与默认路由
        location / {
            proxy_pass http://new_api_backend; 
            
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # AI 专项优化：关闭缓冲
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s; 

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
