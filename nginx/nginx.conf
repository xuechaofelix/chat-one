worker_processes  auto; # 改为 auto，自动匹配 CPU 核心数

events {
    worker_connections  1024;
}

http {
    include       /etc/mime.types; # 注意：确保路径与你系统一致
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile        on;
    keepalive_timeout  65;

    # 【优化1】定义 upstream 并在内部使用域名，配合 Resolver
    # 这样 Nginx 只会在启动和失效时解析一次，同时完美支持长连接
    upstream new_api_backend {
        server new-api:3000;
        keepalive 32; # 保持 32 个空闲长连接，大幅降低 TTFB
    }

    server {
        listen       80;
        server_name  localhost;

        # 指定 Docker 内部 DNS
        resolver 127.0.0.11 valid=30s;

        location / {
            # 【优化2】直接转发给 upstream，享受 DNS 缓存与长连接
            proxy_pass http://new_api_backend; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 针对 AI 流式传输（SSE/Chunked）的黄金组合配置
            # 必须关闭 proxy_buffering，否则大模型的流式回答会卡住变成一次性吐出！
            proxy_buffering off; 
            proxy_cache off;
            proxy_read_timeout 600s; # 防止大模型思考时间过长导致超时

            # 【优化3】智能兼容 WebSocket 和普通长连接
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # 【优化4】配合上面的智能 WebSocket 配置（写在 http 块内，server 块外）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      keep-alive; # 如果不是 WS 请求，则保持 HTTP 长连接
    }
}
